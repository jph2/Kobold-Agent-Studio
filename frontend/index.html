<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw-Chat | Workspace 3090</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <aside>
        <div class="header">
            <h1>Kobold-Claw <span>MCP</span></h1>
        </div>
        
        <div class="progress-container">
            <div class="progress-label">
                <span>Context Usage</span>
                <span id="usage-text">0 / 32k</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="usage-fill" style="width: 0%"></div>
            </div>
        </div>

        <div style="margin-top: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem;">
            <button onclick="clearAll()" class="action-btn" style="background: rgba(239, 68, 68, 0.1); color: var(--error-red); padding: 0.6rem; border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2); width: 100%; justify-content: center;">
                Clear History 🗑️
            </button>
            <div class="config-item">
                <label>Max Context</label>
                <input type="number" id="max-context" value="32768" placeholder="e.g. 32768">
            </div>
            <div class="config-item">
                <label>Temperature</label>
                <input type="number" id="temp" step="0.1" value="0.7">
            </div>
            <div class="config-item">
                <label>Max Response Tokens</label>
                <input type="number" id="max-tokens" value="4096">
            </div>
        </div>

        <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--glass-border); font-size: 0.7rem; color: var(--text-secondary);">
            Connector v1.1.0-beta<br>
            Powered by RTX 3090
        </div>
    </aside>

    <main>
        <div id="chat-container">
            <!-- Messages will be rendered here dynamically -->
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="chat-input" placeholder="Type or paste context here... (Shift+Enter for newline)" rows="1"></textarea>
                <button id="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
