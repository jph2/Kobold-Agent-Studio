<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kobalt-Claw-Interfaze | 3090 AI Control</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <aside>
        <div class="header">
            <h1><span>⚡</span> CLAW-CHAT</h1>
        </div>
        <div class="status-pill" id="system-status">System: Ready</div>
        
        <div class="config-panel">
            <h3 style="font-size: 0.8rem; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 1rem;">Config</h3>
            <div style="display: flex; flex-direction: column; gap: 0.75rem; font-size: 0.85rem;">
                <div>Host: <span style="color: var(--neon-blue);">3090 PC (5001)</span></div>
                <div>Model: <span style="color: var(--text-secondary);">Nemotron 30B</span></div>
                <div>Temp: <input id="temp" type="number" step="0.1" value="0.7" style="width: 40px; background: transparent; border: 1px solid var(--glass-border); color: var(--neon-blue); padding: 2px;"></div>
            </div>
        </div>
        
        <div style="margin-top: auto; font-size: 0.75rem; color: var(--text-secondary);">
            Connector v1.0.0
        </div>
    </aside>

    <main>
        <div id="chat-container">
            <!-- Messages go here -->
            <div class="message bot-msg">
                Welcome, Commander. Your local 3090 is warmed up. What are we building today?
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="chat-input" placeholder="Nachricht an Nemotron..." rows="1"></textarea>
                <button id="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
